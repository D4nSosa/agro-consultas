<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Resultados - Recomendador de Cultivos</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header class="app-header">
    <div class="left">
      <img class="brand" src="dwnl.png" alt="logo" />
      <div class="brand-text">
        <div class="title">Recomendador de Cultivos</div>
        <div class="subtitle">Resultados v1.0</div>
      </div>
    </div>

    <div class="right">
      <button id="themeToggle" class="icon-btn" title="Cambiar tema">🌗</button>
      <a class="btn link" href="index.html" style="margin-left:10px">← Nueva búsqueda</a>
    </div>
  </header>

  <main class="container">
    <h2 style="text-align:center;margin-top:20px">
      Provincia: <span id="resultado_ubicacion"></span>
    </h2>

    <section id="crop-results" class="crop-grid">
      <!-- Las recomendaciones se cargan aquí desde script.js -->
    </section>
  </main>

  <footer class="app-footer">
    <small>Recomendador de Cultivos — Agro Consultas v1.0</small>
  </footer>

  <script src="script.js"></script>
  <script>
    // Theme toggle logic (keeping it simple and consistent with index.html)
    const themeToggle = document.getElementById('themeToggle');
    function applyTheme(t) {
      if (t === 'dark') document.documentElement.classList.add('theme-dark');
      else document.documentElement.classList.remove('theme-dark');
    }
    const saved = localStorage.getItem('agro_theme') || 'dark';
    applyTheme(saved);
    themeToggle.addEventListener('click', () => {
      const cur = document.documentElement.classList.contains('theme-dark') ? 'dark' : 'light';
      const next = cur === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      localStorage.setItem('agro_theme', next);
    });
  </script>

</body>
</html>
